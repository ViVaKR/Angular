name: angular-buddham-co-kr
services:
  buddham.angular:
    build:
      context: .
      dockerfile: Dockerfile
    image: angular-buddham-co-kr:latest
    container_name: angular-buddham-co-kr
    ports:
      - "51297:4000"

    environment:
      - NODE_ENV=production
      - PORT=4000

    networks:
      - buddham_network

    restart: always

    volumes:
      - ./public:/app/public

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:4000/health'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  buddham_network:
    external: true
    name: buddham_network
