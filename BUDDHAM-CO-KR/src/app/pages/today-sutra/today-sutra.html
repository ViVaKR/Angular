<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title [title]="title" />

  <div class="w-full min-h-1/2 max-h-1/2">
    <accordion-table
                     (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data()"
                     [detailUrl]="detailUrl"
                     [cols]="columns()">
    </accordion-table>
  </div>
  <div class="w-full h-full">
    <app-create-today-sutra
                            [(data)]="selectedData"
                            (resetRequested)="onResetRequested()">
    </app-create-today-sutra>
  </div>

</div>
