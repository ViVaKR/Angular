<!-- 로딩 중 -->
@if(service.contentList.isLoading()) {
<loading-state></loading-state>
}

<!-- 오류 발생 -->
@else if(service.contentList.error()) {
<error-state (retry)="reloadData()"></error-state>
<div
     class="flex flex-col justify-center items-center min-h-100
     gap-4 p-6 bg-rose-50 rounded-2xl border
     border-rose-100">
  <mat-icon class="text-rose-500 scale-150">cloud_off</mat-icon>

  <div class="text-center">
    <p class="text-rose-800 font-bold text-lg">데이터를 가져오지 못했습니다.</p>
    <p class="text-rose-600/70 text-sm">네트워크 상태를 확인하고 다시 시도해주세요.</p>
  </div>

  <div class="flex gap-3 mt-2">
    <button mat-flat-button
            color="primary"
            (click)="service.contentList.reload()"
            class="rounded-full">
      <mat-icon>refresh</mat-icon>
      다시 시도
    </button>

    <button mat-stroked-button
            [routerLink]="['/Home']"
            class="rounded-full">
      홈으로
    </button>
  </div>

  @if (isDevelopment) {
  <pre
       class="mt-4 p-2 text-xs bg-black/5
       rounded text-left overflow-auto
       max-w-full">{{ service.contentList.error() | json }}</pre>
  }
</div>
}

<!-- 정상 상태 -->
@else if(service.contentList.value(); as data){
<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title [title]="title" />

  <div class="w-full h-auto">
    <accordion-table (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data"
                     [detailUrl]="detailUrl"
                     [cols]="columns()"
                     [searchConfig]="searchConfig"
                     [isServerSearchActive]="false"
                     [totalItems]="data.length" />
  </div>

  <div class="flex justify-evenly items-center">
    <button matButton="elevated" (click)="goTo()">글쓰기</button>
  </div>
</div>

}
