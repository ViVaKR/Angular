<!-- ══════════════════════════════════════════════════
     MarkdownViewer 테스트 페이지
     ══════════════════════════════════════════════════ -->

<div class="max-w-4xl mx-auto p-4 flex flex-col gap-4">

  <!-- 헤더 -->
  <div class="flex items-center gap-3 py-4 border-b border-slate-200">
    <mat-icon class="text-sky-500 text-3xl w-8 h-8">auto_stories</mat-icon>
    <div>
      <h2 class="text-xl font-bold text-slate-800 font-noto">
        Markdown Viewer 테스트
      </h2>
      <p class="text-xs text-slate-400">
        ngx-markdown · KaTeX · Mermaid · DOMPurify
      </p>
    </div>
  </div>

  <!-- 탭 선택 버튼 -->
  <div class="flex flex-wrap gap-2">
    @for (tab of tabs; track $index) {
    <button
            mat-stroked-button
            [color]="activeTab() === $index ? 'primary' : ''"
            [class.bg-sky-50]="activeTab() === $index"
            (click)="selectTab($index)">
      <mat-icon class="text-sm">{{ tab.icon }}</mat-icon>
      {{ tab.label }}
    </button>
    }
  </div>

  <!-- 현재 탭 라벨 -->
  <div class="flex items-center gap-2 text-sm text-slate-500">
    <mat-icon class="text-base w-4 h-4">
      {{ tabs[activeTab()].icon }}
    </mat-icon>
    <span class="font-medium">{{ tabs[activeTab()].label }}</span>
    <span class="text-slate-300">테스트 중</span>
  </div>

  <!-- ── 테마 3종 비교 ── -->
  <div class="grid grid-cols-1 gap-6">

    <!-- Default 테마 -->
    <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
      <div class="bg-slate-100 px-4 py-2 flex items-center gap-2 border-b border-slate-200">
        <span class="w-3 h-3 rounded-full bg-slate-400"></span>
        <span class="text-xs font-mono text-slate-500">theme="default"</span>
        <span class="text-xs text-slate-400 ml-auto">일반 게시판</span>
      </div>
      <div class="p-4 bg-white">
        <markdown-viewer
                         [content]="currentContent()"
                         theme="default" />
      </div>
    </div>

    <!-- Dharma 테마 -->
    <div class="border border-stone-200 rounded-xl overflow-hidden shadow-sm">
      <div class="bg-stone-100 px-4 py-2 flex items-center gap-2 border-b border-stone-200">
        <span class="w-3 h-3 rounded-full bg-amber-400"></span>
        <span class="text-xs font-mono text-stone-500">theme="dharma"</span>
        <span class="text-xs text-stone-400 ml-auto">법문 전용 🙏</span>
      </div>
      <div class="p-6 bg-stone-50">
        <markdown-viewer
                         [content]="currentContent()"
                         theme="dharma" />
      </div>
    </div>

    <!-- Dark 테마 -->
    <div class="border border-slate-700 rounded-xl overflow-hidden shadow-sm">
      <div class="bg-slate-800 px-4 py-2 flex items-center gap-2 border-b border-slate-700">
        <span class="w-3 h-3 rounded-full bg-sky-400"></span>
        <span class="text-xs font-mono text-slate-400">theme="dark"</span>
        <span class="text-xs text-slate-500 ml-auto">다크모드</span>
      </div>
      <div class="p-4 bg-slate-900">
        <markdown-viewer
                         [content]="currentContent()"
                         theme="dark" />
      </div>
    </div>

  </div>

  <!-- compact 모드 테스트 -->
  <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
    <div class="bg-slate-100 px-4 py-2 flex items-center gap-2 border-b">
      <span class="w-3 h-3 rounded-full bg-green-400"></span>
      <span class="text-xs font-mono text-slate-500">
        [compact]="true" [maxHeight]="200"
      </span>
      <span class="text-xs text-slate-400 ml-auto">댓글용 축소 모드</span>
    </div>
    <div class="p-4 bg-white">
      <markdown-viewer
                       [content]="currentContent()"
                       [compact]="true"
                       [maxHeight]="200" />
    </div>
  </div>

</div>
