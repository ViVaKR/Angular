<div class="min-h-screen w-full flex justify-center p-4">
  <form [formGroup]="form" class="w-1/2" (ngSubmit)="onSubmit($event)">

    <!--  제목   -->
    <div class="text-3xl mb-8 text-sky-800 font-cute text-center">
      {{ title }}
    </div>

    <!-- 이메일 (email) -->
    <mat-form-field appearance="fill" class="w-full">

      <mat-label>아이디 (이메일)</mat-label>
      <input matInput required placeholder="이메일" formControlName="email">
      <mat-icon matPrefix>email</mat-icon>

    </mat-form-field>

    <!-- 회신 주소 -->
    <mat-form-field appearance="fill" hidden class="w-full">

      <mat-label>회신주소</mat-label>
      <input matInput type="'text" placeholder="확인주소" formControlName="replyUrl">
    </mat-form-field>

    <div class="flex flex-row justify-evenly gap-2 items-center">
      <button matButton="elevated" type="submit" class="mt-4 w-3/4"> 분실신고 하기... </button>
    </div>

  </form>
</div>
