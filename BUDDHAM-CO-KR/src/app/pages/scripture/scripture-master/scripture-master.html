<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title [title]="title" [view]="false" />
  <div class="w-full">
    <accordion-table (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data()"
                     [detailUrl]="detailUrl"
                     [cols]="columns()">
    </accordion-table>
  </div>

  <div class="w-full">
    <create-scripture-master
                             [(data)]="selectedData"
                             [anchorId]="anchorId()"
                             [recommendedList]="recommendedList()"
                             (resetRequested)="onResetRequested()" />
  </div>

</div>

<div class="fixed right-2 bottom-2 w-10 h-auto p-2 flex items-center justify-center">
  <scroll-to></scroll-to>
</div>
