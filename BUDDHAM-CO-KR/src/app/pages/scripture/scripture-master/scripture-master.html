<!-- 로딩중 -->
@if(service.masterList.isLoading()) {
<loading-state />
}

<!-- 오류발생시 -->
@else if (service.masterList.error()) {

<error-state (retry)="reloadData()" />
<div
     class="flex flex-col justify-center items-center min-h-100
     gap-4 p-6 bg-rose-50 rounded-2xl border
     border-rose-100">
  <mat-icon class="text-rose-500 scale-150">cloud_off</mat-icon>

  <div class="text-center">
    <p class="text-rose-800 font-bold text-lg">데이터를 가져오지 못했습니다.</p>
    <p class="text-rose-600/70 text-sm">네트워크 상태를 확인하고 다시 시도해주세요.</p>
  </div>

  <div class="flex gap-3 mt-2">
    <button mat-flat-button
            color="primary"
            (click)="service.masterList.reload()"
            class="rounded-full">
      <mat-icon>refresh</mat-icon>
      다시 시도
    </button>

    <button mat-stroked-button
            [routerLink]="['/Home']"
            class="rounded-full">
      홈으로
    </button>
  </div>

  @if (isDevelopment) {
  <pre
       class="mt-4 p-2 text-xs bg-black/5
       rounded text-left overflow-auto
       max-w-full">{{ service.masterList.error() | json }}</pre>
  }
</div>
}
<!-- 정상 상태 -->
@else if(service.masterList.value(); as data) {

<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title [title]="title" />
  <div class="w-full">
    <accordion-table
                     (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data"
                     [detailUrl]="detailUrl"
                     [cols]="columns()"
                     [searchConfig]="searchConfig"
                     [isServerSearchActive]="false"
                     [totalItems]="data.length" />
  </div>
  <div class="flex justify-center mt-6"><mat-icon class="text-rose-400/50">handshake</mat-icon></div>

  @if(canManage()) {
  <div class="w-full">
    <create-scripture-master
                             [(data)]="selectedData"
                             [anchorId]="anchorId()"
                             (resetRequested)="onResetRequested()" />
  </div>
  }


</div>

<!-- 애니메이션과 함께 표시/숨김 -->
<div class="fixed right-6 bottom-6 w-auto
            rounded-2xl z-100
            h-auto p-4 flex items-center justify-center
            transition-all duration-300
            hover:bg-slate-300/70">
  <scroll-to />
</div>
}
