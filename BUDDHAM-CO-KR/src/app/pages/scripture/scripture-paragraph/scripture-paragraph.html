<!-- 로딩중 -->
@if(service.paragraphList.isLoading()) {
<loading-state />
}
@else if(service.paragraphList.error()) {
<error-state (retry)="reloadData()" />
}
@else if(service.paragraphList.value()) {
<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title [title]="title" />

  <div class="w-full min-h-1/2 max-h-1/2">
    <accordion-table
                     (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data()"
                     [detailUrl]="detailUrl"
                     [cols]="columns()" />
  </div>

  <div class="flex justify-center mt-6"><mat-icon class="text-rose-400/50">handshake</mat-icon></div>

  <div class="w-full h-auto">
    <app-create-scripture-paragraph
                                    [(data)]="selectedData"
                                    [anchorId]="anchorId()"
                                    (resetRequested)="onResetRequested()" />
  </div>



</div>
<!-- 애니메이션과 함께 표시/숨김 -->
<div class="fixed right-6 bottom-6 w-auto
            rounded-2xl z-100
            h-auto p-4 flex items-center justify-center
            transition-all duration-300
            hover:bg-slate-300/70">
  <scroll-to #scrollComponent />
</div>
}
