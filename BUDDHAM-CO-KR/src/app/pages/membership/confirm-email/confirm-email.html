<div class="w-full h-full flex flex-col items-center p-4 gap-4">

  <app-page-title [title]="title" />

  <form (ngSubmit)="onSubmit()" novalidate
        [formGroup]="form"
        class="flex flex-col gap-4"
        (keydown.enter)="$event.preventDefault()"
        class="w-4/5 flex justify-center mt-8 flex-col px-8">

    <mat-form-field class="mb-8">
      <mat-label>Email</mat-label>
      <input type="email"
             matInput
             formControlName="email"
             autocomplete="email"
             class="text-2xl font-bold"
             placeholder="Ex. email@example.com">

      @if(emailControl.hasError('email') && !emailControl.hasError('required') ) {
      <mat-error>올바른 이메일이 아닙니다.</mat-error>
      }
      @if(emailControl.hasError('required')) {
      <mat-error>이메일은 <strong>필수</strong>입니다.</mat-error>
      }

      <mat-hint class="text-sky-600 font-bold">가입시 등록하신 이메일입니다.(수정불가), 수신이 가능하신지 확인 후 전송하시기 바랍니다.</mat-hint>
    </mat-form-field>

    <div class="w-full  flex flex-col gap-2 justify-center">
      <button type="submit" matButton="outlined">
        @if(isSubmitting()) {
        전송 중...
        }@else {
        이메일 확인하기 전송
        }
      </button>
      @if(submitError()) {
      <mat-error>{{ submitError() }}</mat-error>
      }
    </div>
  </form>


</div>
