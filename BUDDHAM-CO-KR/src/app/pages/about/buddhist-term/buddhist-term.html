<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title
              [view]="false"
              [title]="title"></body-title>
  <app-create-buddhist-term
                            [(data)]="selectedData"
                            (resetRequested)="onResetRequested()" />
  <div class="w-full min-h-1/2 max-h-1/2">
    <accordion-table
                     (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data()"
                     [detailUrl]="detailUrl"
                     [cols]="columns()">
    </accordion-table>
  </div>
  <div class="flex justify-center items-center">
    <button matButton (click)="goTo()">새로만들기...</button>
  </div>
</div>
