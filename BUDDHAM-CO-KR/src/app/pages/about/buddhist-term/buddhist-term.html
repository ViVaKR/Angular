<div class="flex flex-col w-full min-h-screen gap-2 p-4">
  <body-title [title]="title" />
  <div class="w-full min-h-1/2 max-h-1/2">
    <accordion-table (currentData)="onReceiveData($event)"
                     [pageSize]="pageSize()"
                     [data]="data()"
                     [detailUrl]="detailUrl"
                     [cols]="columns()" />
  </div>
  <div class="w-full h-auto">
    <app-create-buddhist-term [(data)]="selectedData"
                              [anchorId]="anchorId()"
                              (resetRequested)="onResetRequested()" />
  </div>


</div>
