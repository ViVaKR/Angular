<div class="flex flex-col gap-2 h-auto">
  <button mat-icon-button (click)="scrollToTopAngular()">
    <mat-icon class="text-teal-800/75">vertical_align_top</mat-icon>
  </button>

  <button mat-icon-button (click)="scrollToAnchor('createId')">
    <mat-icon class="text-teal-800/75">arrow_upward</mat-icon>
  </button>

  <!-- 천천히 스크롤링 글 읽기 목적 -->
  <button
          mat-icon-button
          (click)="scrollForSlowRead()"
          [class.active]="isAutoScrolling()">
    <mat-icon [class.text-amber-500]="!isAutoScrolling()"
              [class.text-green-500]="isAutoScrolling()">
      {{ isAutoScrolling() ? 'pause' : 'speed' }}
    </mat-icon>
  </button>

  <!-- 속도 조절 버튼 (옵션) -->
  @if (isAutoScrolling()) {
  <div class="flex flex-col gap-1 p-2 bg-gray-100 rounded">
    <button mat-icon-button (click)="setSpeedPreset('slow')" matTooltip="느리게">
      <mat-icon class="text-xs">speed</mat-icon>
    </button>
    <button mat-icon-button (click)="setSpeedPreset('medium')" matTooltip="보통">
      <mat-icon>speed</mat-icon>
    </button>
    <button mat-icon-button (click)="setSpeedPreset('fast')" matTooltip="빠르게">
      <mat-icon class="text-lg">speed</mat-icon>
    </button>
  </div>
  }

  <button mat-icon-button (click)="scrollToAnchor('createId')">
    <mat-icon class="text-red-800/75">arrow_downward</mat-icon>
  </button>

  <button mat-icon-button (click)="scrollToBottomAngular()">
    <mat-icon class="text-red-800/75">vertical_align_bottom</mat-icon>
  </button>
</div>
