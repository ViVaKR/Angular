name: angular-buddham-co-kr

services:
  # ============================================
  # Angular Instance 1
  # ============================================
  buddham.angular.1:
    build:
      context: .
      dockerfile: Dockerfile
      # 빌드 캐시 최적화
      cache_from:
        - angular-buddham-co-kr:latest
    image: angular-buddham-co-kr:latest
    container_name: angular-buddham-co-kr-1

    # 포트 매핑 (51297)
    ports:
      - "51297:4000"

    # 환경변수
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=1

    # 네트워크
    networks:
      - buddham_network

    # 재시작 정책
    restart: unless-stopped

    # 볼륨 마운트 (공유 public 폴더)
    volumes:
      - ./public:/app/public:ro # 읽기 전용

    # Health check
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:4000/health'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 로깅
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 리소스 제한 (메모리 부족 방지)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    # 라벨 (모니터링 및 관리)
    labels:
      - "app=buddham-angular"
      - "instance=1"
      - "environment=production"

  # ============================================
  # Angular Instance 2
  # ============================================
  buddham.angular.2:
    image: angular-buddham-co-kr:latest
    container_name: angular-buddham-co-kr-2

    # 포트 매핑 (51298)
    ports:
      - "51298:4000"

    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=2

    networks:
      - buddham_network

    restart: unless-stopped

    volumes:
      - ./public:/app/public:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:4000/health'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    labels:
      - "app=buddham-angular"
      - "instance=2"
      - "environment=production"

    # 첫 번째 인스턴스가 준비될 때까지 대기
    depends_on:
      buddham.angular.1:
        condition: service_healthy

  # ============================================
  # Angular Instance 3
  # ============================================
  buddham.angular.3:
    image: angular-buddham-co-kr:latest
    container_name: angular-buddham-co-kr-3

    # 포트 매핑 (51299)
    ports:
      - "51299:4000"

    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=3

    networks:
      - buddham_network

    restart: unless-stopped

    volumes:
      - ./public:/app/public:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:4000/health'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    labels:
      - "app=buddham-angular"
      - "instance=3"
      - "environment=production"

    # 두 번째 인스턴스가 준비될 때까지 대기
    depends_on:
      buddham.angular.2:
        condition: service_healthy

networks:
  buddham_network:
    external: true
    name: buddham_network
