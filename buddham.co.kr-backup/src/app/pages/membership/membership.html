<div class="grid relative min-h-screen w-full
              transition-all duration-300"
     [ngClass]="{
        'md:grid-cols-[250px_1fr]': showLeft(),
        'md:grid-cols-[0px_1fr]': !showLeft()
       }">

  <!-- 왼쪽 사이드바 -->
  <div class="overflow-y-auto transition-all duration-300
              md:bg-linear-to-b md:from-sky-950/80 md:via-teal-700/50
              md:to-transparent md:via-50% flex flex-col
              max-md:max-h-auto md:min-h-screen"
       [class.md:w-0]="!showLeft()"
       [class.md:w-[250px]]="showLeft()">

    @if(showLeft()) {
    <mat-accordion class="mx-4 my-4 border-none" multi>
      <mat-expansion-panel>
        <mat-expansion-panel-header
                                    class="bg-yellow-100 border-4 opacity-80 font-ibm
                                    border-amber-950/20 text-base text-slate-950">
          나의정보 관리
        </mat-expansion-panel-header>

        @for (item of menus; track $index) {
        <mat-panel-description class="flex flex-row w-full justify-start">
          <button matButton
                  class="w-full flex justify-start items-center"
                  [routerLink]="[item.url]"
                  [routerLinkActive]="['text-yellow-700']">
            <mat-icon fontIcon="menu"></mat-icon>
            {{item.title}}
          </button>
        </mat-panel-description>
        }

      </mat-expansion-panel>
    </mat-accordion>
    }
  </div>

  <!-- 바디 -->
  <div class="relative w-full h-screen">
    <div class="absolute inset-0 w-full h-screen bg-lotus-1 bg-no-repeat bg-center bg-contain opacity-10">
    </div>
    <router-outlet />
  </div>
</div>
