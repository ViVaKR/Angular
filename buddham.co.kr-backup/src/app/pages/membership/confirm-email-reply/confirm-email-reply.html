<div class="max-w-full h-1/2 flex flex-col gap-4 p-4 bg-amber-50/50">
  <app-page-title [title]="title" />

  <!-- Contents -->
  <div class="flex flex-col gap-4 items-center">
    <h3 class="text-3xl text-teal-700">{{reply.email}}</h3>
    <p class="w-full h-auto
          text-slate-400 wrap-anywhere text-[0.3rem] p-4
          border-2 border-amber-400
          rounded-2xl bg-amber-100">{{reply.token}}</p>

    <div class="w-full  flex flex-col gap-2 justify-center">
      <button type="button" matButton="outlined" (click)="onReply()">
        @if(isSubmitting()) {
        전송 중...
        }@else{
        이메일 회신
        }
      </button>

      @if(submitError()) {
      <mat-error>{{ submitError()}}</mat-error>
      }
    </div>
  </div>
</div>
