<nav class="h-18 main-header w-full bg-sky-600 text-base border-b-4
            border-red-400 text-white overflow-hidden flex justify-center items-center">

  <!-- 로고 (정토사경) -->
  <a
     [routerLink]="['']"
     class="h-full w-50 flex items-center justify-center cursor-pointer gap-2 px-4">

    <!-- Lotus SVG Logo -->
    <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Lotus petals - 더 두껍고 명확하게 -->
      <!-- 상단 꽃잎 2개 -->
      <ellipse cx="35" cy="25" rx="12" ry="20" fill="#FCD34D" transform="rotate(-25 35 25)" />
      <ellipse cx="65" cy="25" rx="12" ry="20" fill="#FCD34D" transform="rotate(25 65 25)" />

      <!-- 좌우 꽃잎 2개 -->
      <ellipse cx="18" cy="50" rx="12" ry="18" fill="#FDE68A" transform="rotate(-60 18 50)" />
      <ellipse cx="82" cy="50" rx="12" ry="18" fill="#FDE68A" transform="rotate(60 82 50)" />

      <!-- 하단 꽃잎 4개 -->
      <ellipse cx="28" cy="70" rx="11" ry="18" fill="#FEF3C7" transform="rotate(-40 28 70)" />
      <ellipse cx="42" cy="78" rx="11" ry="16" fill="#FEF3C7" transform="rotate(-15 42 78)" />
      <ellipse cx="58" cy="78" rx="11" ry="16" fill="#FEF3C7" transform="rotate(15 58 78)" />
      <ellipse cx="72" cy="70" rx="11" ry="18" fill="#FEF3C7" transform="rotate(40 72 70)" />

      <!-- Center circle -->
      <circle cx="50" cy="50" r="10" fill="#FBBF24" stroke="#F59E0B" stroke-width="2" />
    </svg>

    <!-- Logo Text -->
    <span class="text-xl font-bold text-amber-100 whitespace-nowrap">정토사경</span>
  </a>

  <!-- 공백 -->
  <div class="flex-1"></div>

  <div class="w-full flex flex-row justify-center items-center max-md:hidden">
    @for (menu of menus; track $index) {
    <button matButton
            [routerLink]="[menu.url]"
            class="text-lg! font-noto! text-white!"
            [routerLinkActive]="['text-yellow-400!']">
      {{ menu.title }}
    </button>
    }
  </div>
  <div class="w-8/12 h-full flex justify-center items-center md:hidden">

    <button matIconButton
            [matMenuTriggerFor]="mainMenu"
            class="text-white!  flex!  hover:bg-amber-200!  hover:text-pink-500!  justify-center!  items-center!"
            aria-label="회원메뉴">
      <mat-icon aria-hidden="false" aria-label="Example home icon" fontIcon="menu"></mat-icon>
    </button>

  </div>

  <!-- <div class="flex-1"></div> -->
  <!-- membership -->

  @if (isLoggedIn$ | async) {
  <!-- Avata -->
  @if (currentUser(); as user) {
  <div class="w-52 h-full gap-2 flex flex-row items-center justify-around">
    <img
         id="avatarButton"
         type="button"
         [matMenuTriggerFor]="avataMenu"
         class="w-8 rounded-full cursor-pointer"
         [src]="avatar()"
         [alt]="user.pseudonym">

    <button
            matButton
            [matMenuTriggerFor]="avataMenu"
            class="flex flex-col w-full items-start! justify-center! text-[0.7rem]!">
      <p class="text-white!">{{ user.pseudonym }}</p>
      <p class="text-white!">{{ user.roles }}</p>
    </button>

  </div>

  }
  <div class="bg-logo-512"></div>
  } @else {
  <!-- More -->
  <button matIconButton
          [matMenuTriggerFor]="menu"
          class="text-white!  flex!  hover:bg-amber-200!
                  hover:text-pink-500!  justify-center!  items-center!"
          aria-label="회원메뉴">
    <mat-icon>more_vert</mat-icon>
  </button>
  }
  <div class="w-9 h-full"></div>
</nav>

<!-- main menu -->
<mat-menu #mainMenu="matMenu" xPosition="before">
  @for (menu of menus; track $index) {
  <button mat-menu-item
          [routerLink]="[menu.url]"
          [hidden]="isLoggedIn()"
          [routerLinkActive]="['text-sky-600!']">
    <mat-icon
              [routerLinkActive]="['text-sky-600!']">{{ menu.icon }}
    </mat-icon>
    <span> {{ menu.title }} </span>
  </button>
  }

</mat-menu>

<!-- 로그인 메뉴 -->
<mat-menu #menu="matMenu">
  @for (menu of signInMenus; track $index) {
  <button (click)="goTo(menu.url)" mat-menu-item>
    <mat-icon>{{menu.icon}}</mat-icon>
    <span>{{menu.title}}</span>
  </button>
  }
</mat-menu>

<!-- Avata Dropdown menu -->


<!-- 로그아웃 메뉴 -->
<mat-menu #avataMenu="matMenu">
  @for (menu of signOutMenus; track $index) {
  <button (click)="goTo(menu.url)" mat-menu-item>
    <mat-icon>{{menu.icon}}</mat-icon>
    <span>{{menu.title}}</span>
  </button>
  }
</mat-menu>
